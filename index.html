<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, 
                #0a0a15 0%, 
                #16213e 30%, 
                #0f3460 60%,
                #0a0a15 100%);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 星星背景层 */
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 流星层 */
        .meteors-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .meteor {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to top, 
                rgba(0, 212, 255, 0.9), 
                rgba(255, 215, 0, 0.5), 
                transparent);
            opacity: 0;
        }

        .meteor::before {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00d4ff;
            border-radius: 50%;
            bottom: -3px;
            left: -2px;
            box-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
        }

        /* 主容器 */
        .time-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 25px;
            padding: 50px 60px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 0 100px rgba(0, 212, 255, 0.08),
                inset 0 0 60px rgba(255, 255, 255, 0.03);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { 
                box-shadow: 
                    0 0 100px rgba(0, 212, 255, 0.08),
                    inset 0 0 60px rgba(255, 255, 255, 0.03);
            }
            50% { 
                box-shadow: 
                    0 0 140px rgba(0, 212, 255, 0.15),
                    inset 0 0 80px rgba(255, 255, 255, 0.05);
            }
        }

        /* 时间数字 */
        .time-block {
            text-align: center;
        }

        .time-value {
            font-size: 80px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, 
                #00d4ff 0%, 
                #00a8cc 50%,
                #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(0, 212, 255, 0.3);
            font-variant-numeric: tabular-nums;
            min-width: 100px;
            transition: all 0.3s ease;
        }

        .time-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 12px;
        }

        /* 分隔符 */
        .time-separator {
            font-size: 60px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
        }

        /* 数字变化动画 */
        .time-value.changing {
            animation: numberPop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes numberPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        /* 诗句容器 */
        .poems-container {
            position: relative;
            z-index: 10;
            margin-top: 40px;
            text-align: center;
            max-width: 500px;
        }

        .poem-line {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin: 12px 0;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
        }

        .poem-line.special {
            background: linear-gradient(135deg, #00d4ff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .poem-line:nth-child(1) { animation-delay: 0.2s; }
        .poem-line:nth-child(2) { animation-delay: 0.4s; }
        .poem-line:nth-child(3) { animation-delay: 0.6s; }
        .poem-line:nth-child(4) { animation-delay: 0.8s; }
        .poem-line:nth-child(5) { animation-delay: 1s; }
        .poem-line:nth-child(6) { animation-delay: 1.2s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 铭牌容器 */
        .plate-container {
            position: relative;
            z-index: 10;
            margin-top: 40px;
            perspective: 800px;
        }

        .plate {
            cursor: pointer;
            transition: transform 0.6s ease-in-out;
            transform-style: preserve-3d;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 0 100px rgba(0, 212, 255, 0.08),
                inset 0 0 60px rgba(255, 255, 255, 0.03);
        }

        .plate.rotated {
            transform: rotate(180deg);
        }

        .plate-text {
            font-family: 'Quicksand', sans-serif;
            font-size: 40px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 5px;
            user-select: none;
            font-variant-numeric: tabular-nums;
            transition: all 0.6s ease-in-out;
        }

        .plate-text.colored {
            background: linear-gradient(135deg, 
                #00d4ff 0%, 
                #00a8cc 50%,
                #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        /* 装饰光斑 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            opacity: 0.4;
            animation: floatOrb 15s ease-in-out infinite;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #00d4ff;
            top: -80px;
            right: -80px;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: #ffd700;
            bottom: -60px;
            left: -60px;
            animation-delay: -7s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* 响应式 - 手机优化 */
        @media (max-width: 700px) {
            body {
                padding: 15px;
            }

            .time-container {
                padding: 35px 45px;
                gap: 18px;
            }

            .time-value {
                font-size: 55px;
                min-width: 70px;
            }

            .time-separator {
                font-size: 45px;
            }

            .time-label {
                font-size: 10px;
                letter-spacing: 3px;
                margin-top: 8px;
            }

            .poems-container {
                margin-top: 25px;
            }

            .poem-line {
                font-size: 13px;
                margin: 8px 0;
            }

            .poem-line.special {
                text-shadow: 0 0 15px rgba(0, 212, 255, 0.25);
            }

            .plate-container {
                margin-top: 25px;
            }

            .plate {
                padding: 15px 30px;
                border-radius: 40px;
            }

            .plate-text {
                font-size: 30px;
                letter-spacing: 4px;
                text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            }

            .orb-1 {
                width: 200px;
                height: 200px;
                top: -60px;
                right: -60px;
            }

            .orb-2 {
                width: 180px;
                height: 180px;
                bottom: -50px;
                left: -50px;
            }
        }

        /* 更小的手机 */
        @media (max-width: 400px) {
            .time-container {
                padding: 25px 30px;
                gap: 12px;
            }

            .time-value {
                font-size: 42px;
                min-width: 55px;
            }

            .time-separator {
                font-size: 35px;
            }

            .poem-line {
                font-size: 11px;
            }
        }

        /* 确认卡片 */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .confirm-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .confirm-card {
            background: rgba(20, 30, 50, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        inset 0 0 80px rgba(255, 255, 255, 0.03);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            max-width: 400px;
        }

        .confirm-modal.visible .confirm-card {
            transform: scale(1);
        }

        .confirm-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #fff;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00d4ff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .confirm-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .confirm-btn {
            padding: 15px 35px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Quicksand', sans-serif;
            letter-spacing: 2px;
        }

        .confirm-btn.yes {
            background: linear-gradient(135deg, #00d4ff, #00a8cc);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .confirm-btn.yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        .confirm-btn.no {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .confirm-btn.no:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        /* 手机端卡片优化 */
        @media (max-width: 500px) {
            .confirm-card {
                padding: 30px 35px;
                margin: 20px;
            }

            .confirm-title {
                font-size: 20px;
            }

            .confirm-btn {
                padding: 12px 28px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 装饰光斑 -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <!-- 星星背景 -->
    <div class="stars-layer" id="starsLayer"></div>

    <!-- 流星层 -->
    <div class="meteors-layer" id="meteorsLayer"></div>

    <!-- 时间显示 -->
    <div class="time-container">
        <div class="time-block">
            <div class="time-value" id="hours">00</div>
            <div class="time-label">HOURS</div>
        </div>
        <span class="time-separator">:</span>
        <div class="time-block">
            <div class="time-value" id="minutes">00</div>
            <div class="time-label">MINUTES</div>
        </div>
        <span class="time-separator">:</span>
        <div class="time-block">
            <div class="time-value" id="seconds">00</div>
            <div class="time-label">SECONDS</div>
        </div>
    </div>

    <!-- 诗句 -->
    <div class="poems-container">
        <div class="poem-line special">"Time is very slow for those who wait."</div>
        <div class="poem-line special">"The golden sunlight doth beauty bring."</div>
    </div>

    <!-- 铭牌模块 -->
    <div class="plate-container">
        <div class="plate" id="plate">
            <div class="plate-text" id="plateText">00019</div>
        </div>
    </div>

    <!-- 确认卡片 -->
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-card">
            <div class="confirm-title">是否进入游乐园？</div>
            <div class="confirm-buttons">
                <button class="confirm-btn yes" id="yesBtn">是</button>
                <button class="confirm-btn no" id="noBtn">否</button>
            </div>
        </div>
    </div>

    <script>
        // 创建星星背景
        function createStars() {
            const container = document.getElementById('starsLayer');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // 创建单个流星
        function createMeteor() {
            const container = document.getElementById('meteorsLayer');
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            
            // 随机起始位置 - 左上区域分布更均匀
            const startX = Math.random() * 80 - 10; // -10% 到 70%
            const startY = Math.random() * 50 - 10; // -10% 到 40%
            
            // 随机滑动距离 - 不同流星在不同地方消失
            const distanceX = 300 + Math.random() * 400; // 300-700px
            const distanceY = 300 + Math.random() * 400; // 300-700px
            
            // 随机动画时长
            const duration = 2 + Math.random() * 2; // 2-4秒
            
            meteor.style.left = startX + '%';
            meteor.style.top = startY + '%';
            
            // 动态创建关键帧动画
            const animName = 'meteor_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const style = document.createElement('style');
            style.textContent = `
                @keyframes ${animName} {
                    0% {
                        opacity: 0;
                        transform: translate(0, 0) rotate(-45deg);
                    }
                    10% {
                        opacity: 1;
                    }
                    90% {
                        opacity: 1;
                    }
                    100% {
                        opacity: 0;
                        transform: translate(${distanceX}px, ${distanceY}px) rotate(-45deg);
                    }
                }
            `;
            document.head.appendChild(style);
            
            meteor.style.animation = `${animName} ${duration}s linear forwards`;
            
            container.appendChild(meteor);
            
            // 动画结束后清理
            setTimeout(() => {
                if (container.contains(meteor)) {
                    container.removeChild(meteor);
                }
                if (document.head.contains(style)) {
                    document.head.removeChild(style);
                }
            }, (duration + 0.5) * 1000);
        }

        // 初始化 - 较少流星，分布更均匀
        for (let i = 0; i < 3; i++) {
            setTimeout(createMeteor, i * 1200);
        }

        // 持续创建流星 - 降低频率
        setInterval(createMeteor, 2500);

        // 计时器逻辑
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');

        function updateDisplay() {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 42, 0);
            
            let diffMs = now - start;
            if (diffMs < 0) diffMs = 0;
            
            const diffSeconds = Math.floor(diffMs / 1000);
            let h = Math.floor(diffSeconds / 3600);
            let m = Math.floor((diffSeconds % 3600) / 60);
            let s = diffSeconds % 60;

            const newH = String(h).padStart(2, '0');
            const newM = String(m).padStart(2, '0');
            const newS = String(s).padStart(2, '0');

            // 更新并添加动画
            if (hoursEl.textContent !== newH) {
                hoursEl.textContent = newH;
                animateElement(hoursEl);
            }
            if (minutesEl.textContent !== newM) {
                minutesEl.textContent = newM;
                animateElement(minutesEl);
            }
            if (secondsEl.textContent !== newS) {
                secondsEl.textContent = newS;
                animateElement(secondsEl);
            }
        }

        function animateElement(el) {
            el.classList.remove('changing');
            void el.offsetWidth;
            el.classList.add('changing');
        }

        // 初始化并每秒更新
        updateDisplay();
        setInterval(updateDisplay, 1000);

        // 铭牌旋转逻辑
        const plate = document.getElementById('plate');
        const plateText = document.getElementById('plateText');
        const confirmModal = document.getElementById('confirmModal');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        
        let isRotated = false;
        let isCardShown = false;

        plate.addEventListener('click', () => {
            if (!isRotated) {
                // 第一次点击：旋转变成61000
                isRotated = true;
                plate.classList.add('rotated');
                
                // 旋转到位时添加彩色
                setTimeout(() => {
                    plateText.classList.add('colored');
                }, 450);
            } else if (!isCardShown) {
                // 第二次点击：弹出确认卡片，不旋转
                isCardShown = true;
                confirmModal.classList.add('visible');
            }
        });

        // 点击"是"跳转
        yesBtn.addEventListener('click', () => {
            window.location.href = 'ferris-wheel.html';
        });

        // 点击"否"关闭卡片
        noBtn.addEventListener('click', () => {
            confirmModal.classList.remove('visible');
            isCardShown = false;
        });

        // 点击背景关闭卡片
        confirmModal.addEventListener('click', (e) => {
            if (e.target === confirmModal) {
                confirmModal.classList.remove('visible');
                isCardShown = false;
            }
        });
    </script>
</body>
</html>
